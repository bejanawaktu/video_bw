<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Reels - Light Theme</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandGreen: '#14b8a6', /* Menyesuaikan warna hijau brand */
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen py-10">

    <!-- Container Utama Background Putih -->
    <section class="w-full max-w-sm px-5 pt-6 pb-10 relative overflow-hidden bg-white shadow-2xl rounded-3xl">

        <!-- Efek Blur Background (Disesuaikan agar tidak terlalu mencolok di bg putih) -->
        <div class="absolute top-10 left-0 w-32 h-32 bg-brandGreen rounded-full blur-[60px] opacity-20 pointer-events-none"></div>
        <div class="absolute bottom-10 right-0 w-24 h-24 bg-brandGreen rounded-full blur-[50px] opacity-15 pointer-events-none"></div>

        <!-- Header: Judul & Tombol Instagram -->
        <div class="flex items-center justify-between mb-5 relative z-10">
            <div>
                <div class="flex items-center gap-2 mb-1">
                    <span class="relative flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-red-500"></span>
                    </span>
                    <!-- Teks diubah jadi abu-abu agar terbaca di bg putih -->
                    <p class="text-[7px] tracking-[0.25em] text-gray-500 uppercase font-semibold">Latest Content</p>
                </div>
                <!-- Teks judul diubah jadi abu-abu gelap/hitam -->
                <h2 class="text-xl font-black tracking-tight text-gray-900 leading-none">THE <span class="text-brandGreen">REELS</span></h2>
            </div>
            
            <!-- Tombol IG diubah jadi terang (bg abu-abu muda, border abu-abu) -->
            <a href="https://www.instagram.com/bejanawaktu" target="_blank" class="flex items-center gap-1.5 bg-gray-50 border border-gray-200 rounded-full px-3 py-1.5 transition hover:bg-gray-100">
                <svg class="w-3 h-3 text-gray-700" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>
                </svg>
                <span class="text-[7px] text-gray-700 font-bold">@bejanawaktu</span>
            </a>
        </div>

        <!-- Video Grid -->
        <div class="flex gap-2.5 relative z-10" style="height: 300px;">

            <!-- Video Utama Kiri (Isi tetap dark/teks putih karena ada overlay gradient di videonya) -->
            <div onclick="window.open('https://www.instagram.com/bejanawaktu/reel/DXEXUXJDlLT/', '_blank')" class="reel-card relative rounded-[22px] overflow-hidden cursor-pointer flex-shrink-0 shadow-lg group" style="width: 55%; height: 100%;">
                <video autoplay muted loop playsinline class="w-full h-full object-cover scale-[1.02] group-hover:scale-[1.06] transition-transform duration-700">
                    <source src="https://www.image2url.com/r2/default/videos/1777006600163-0fc2bdae-c7ae-4861-821a-ff97fd930256.mp4" type="video/mp4">
                </video>

                <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/10 to-black/30 pointer-events-none"></div>

                <div class="absolute top-3 left-3 flex items-center gap-1.5 z-10">
                    <div class="bg-brandGreen/90 backdrop-blur-sm text-white text-[6.5px] font-black px-2 py-0.5 rounded-full tracking-wider uppercase">✦ FEATURED</div>
                </div>

                <div class="absolute inset-0 flex items-center justify-center z-10 opacity-70 group-hover:opacity-0 transition-opacity duration-300">
                    <div class="w-10 h-10 rounded-full bg-white/20 backdrop-blur-md border border-white/30 flex items-center justify-center shadow-lg">
                        <svg class="w-4 h-4 text-white ml-0.5" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M8 5v14l11-7z"/>
                        </svg>
                    </div>
                </div>

                <div class="absolute bottom-0 left-0 right-0 p-3 z-10">
                    <p class="text-white font-black text-[10px] leading-tight mb-1">8 years and never regrets my 2016’s</p>
                    <div class="flex items-center gap-2">
                        <div class="flex items-center gap-1">
                            <svg class="w-2.5 h-2.5 text-white/80" viewBox="0 0 24 24" fill="currentColor"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                            <span class="text-[6.5px] text-white/80 font-medium">17.1K</span>
                        </div>
                        <div class="flex items-center gap-1">
                            <svg class="w-2.5 h-2.5 text-white/80" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                            <span class="text-[6.5px] text-white/80 font-medium">1351</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Video Kecil Kanan -->
            <div class="flex flex-col gap-2.5 flex-1">

                <div onclick="window.open('https://www.instagram.com/bejanawaktu/reel/DW1XOmyiZbI/', '_blank')" class="reel-card relative rounded-[18px] overflow-hidden cursor-pointer shadow-lg group flex-1">
                    <video autoplay muted loop playsinline class="w-full h-full object-cover scale-[1.02] group-hover:scale-[1.07] transition-transform duration-700">
                        <source src="https://www.image2url.com/r2/default/videos/1777006756562-f1b2d46a-038b-4c71-9213-18364e800d2c.mp4" type="video/mp4">
                    </video>

                    <div class="absolute inset-0 bg-gradient-to-t from-black/75 via-transparent to-black/20 pointer-events-none"></div>

                    <div class="absolute inset-0 flex items-center justify-center z-10 opacity-70 group-hover:opacity-0 transition-opacity duration-300">
                        <div class="w-7 h-7 rounded-full bg-white/25 backdrop-blur-sm border border-white/30 flex items-center justify-center shadow">
                            <svg class="w-3 h-3 text-white ml-0.5" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                        </div>
                    </div>

                    <div class="absolute bottom-0 left-0 right-0 p-2.5 z-10">
                        <p class="text-white font-black text-[8px] leading-tight">pernah denger kali..</p>
                        <div class="flex items-center gap-1 mt-0.5">
                            <svg class="w-2 h-2 text-white/80" viewBox="0 0 24 24" fill="currentColor"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                            <span class="text-[5.5px] text-white/80 font-medium">19.7K</span>
                        </div>
                    </div>
                </div>

                <div onclick="window.open('https://www.instagram.com/bejanawaktu/reel/DU58I79jyIL/', '_blank')" class="reel-card relative rounded-[18px] overflow-hidden cursor-pointer shadow-lg group flex-1">
                    <video autoplay muted loop playsinline class="w-full h-full object-cover scale-[1.02] group-hover:scale-[1.07] transition-transform duration-700">
                        <source src="https://www.image2url.com/r2/default/videos/1777006989614-7394fedc-71fa-4ae4-bec4-2348bb533b6f.mp4" type="video/mp4">
                    </video>

                    <div class="absolute inset-0 bg-gradient-to-t from-black/75 via-transparent to-black/20 pointer-events-none"></div>

                    <div class="absolute inset-0 flex items-center justify-center z-10 opacity-70 group-hover:opacity-0 transition-opacity duration-300">
                        <div class="w-7 h-7 rounded-full bg-white/25 backdrop-blur-sm border border-white/30 flex items-center justify-center shadow">
                            <svg class="w-3 h-3 text-white ml-0.5" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                        </div>
                    </div>

                    <div class="absolute bottom-0 left-0 right-0 p-2.5 z-10">
                        <p class="text-white font-black text-[8px] leading-tight">The power of understanding mix lighting.</p>
                        <div class="flex items-center gap-1 mt-0.5">
                            <svg class="w-2 h-2 text-white/80" viewBox="0 0 24 24" fill="currentColor"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                            <span class="text-[5.5px] text-white/80 font-medium">29.8K</span>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <!-- Garis pembatas dan Link Footer diubah menyesuaikan background putih -->
        <div class="relative z-10 mt-5 flex items-center justify-between">
            <div class="h-[1px] flex-1 bg-gradient-to-r from-transparent to-gray-200 mr-3"></div>
            <a href="https://www.instagram.com/bejanawaktu" target="_blank" class="flex items-center gap-1.5 text-[7.5px] text-gray-400 hover:text-gray-800 transition font-bold tracking-wider uppercase">
                See All Reels
                <svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 5l7 7-7 7"/></svg>
            </a>
        </div>

    </section>

</body>
</html>
